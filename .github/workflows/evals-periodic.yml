name: Periodic Validation
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Test
        run: bun test

      - name: Check generated skills
        run: bun run skill:check

      - name: Check committed main contract freshness
        run: bun run bin/kstack-state.ts export-contract --check --branch main

      - name: Verify self-hosting invariants
        run: bun run bin/kstack-state.ts verify-self-hosting
